# ansible/nodes.yml
- name: Setup Docker
  hosts:
    - servers
  gather_facts: true
  become: true
  vars:
    dockerVersion: "5:29.4.0-1~ubuntu.22.04~jammy"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      register: dockerRepo

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes
      when: dockerRepo.changed

    - name: Remove hold from Docker packages
      dpkg_selections:
        name: "{{ item }}"
        selection: install
      loop:
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-compose-plugin

    - name: Install specific Docker version
      apt:
        name:
          - "docker-ce={{ dockerVersion }}"
          - "docker-ce-cli={{ dockerVersion }}"
          - containerd.io
          - docker-compose-plugin
        state: present
        allow_downgrade: yes

    - name: Hold Docker packages
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-compose-plugin

    - name: Ensure Docker service is enabled and running
      systemd:
        name: docker
        enabled: yes
        state: started
